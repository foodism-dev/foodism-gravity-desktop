# GitHub Actions: 自动打包分发
#
# 触发条件：推送 v* tag（如 v0.4.0）
# 构建 macOS arm64 和 Windows x64 产物并发布到 GitHub Releases
#
# macOS 当前发布内测包：ad-hoc 签名，不做 Apple Developer ID 签名/公证。
# GITHUB_TOKEN 由 GitHub Actions 自动提供，无需手动配置

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      work_orders_url:
        description: '打包内置的工单系统地址'
        required: false
        default: 'https://testpc.foodism.pro/tickets'

env:
  VITE_PROMA_WORK_ORDERS_URL: ${{ github.event.inputs.work_orders_url || 'https://testpc.foodism.pro/tickets' }}

permissions:
  contents: write

jobs:
  build-mac-arm64:
    name: build (macos-latest, mac, arm64, --arm64)
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: bun install --frozen-lockfile

      - name: 写入默认模型配置
        shell: bash
        env:
          FOODISM_DEFAULT_RELAY_API_KEY: ${{ secrets.FOODISM_DEFAULT_RELAY_API_KEY }}
        run: |
          if [ -n "$FOODISM_DEFAULT_RELAY_API_KEY" ]; then
            printf '\nFOODISM_DEFAULT_RELAY_API_KEY=%s\n' "$FOODISM_DEFAULT_RELAY_API_KEY" >> apps/electron/resources/default.env
          else
            echo "::warning::未配置 FOODISM_DEFAULT_RELAY_API_KEY，发布包不会内置默认供应商 Key"
          fi

      # 构建应用
      - name: 构建 Electron 应用
        run: bun run electron:build
        working-directory: .

      # 打包并发布到 GitHub Releases
      - name: 打包并发布 (macOS)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          FOODISM_MAC_ADHOC_SIGN: "true"
        run: |
          for i in 1 2 3; do
            npx electron-builder --mac --arm64 --publish always && break
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
        working-directory: apps/electron

  build-windows-x64:
    name: build (windows-latest, win, x64, --x64)
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: bun install --frozen-lockfile

      - name: 写入默认模型配置
        shell: bash
        env:
          FOODISM_DEFAULT_RELAY_API_KEY: ${{ secrets.FOODISM_DEFAULT_RELAY_API_KEY }}
        run: |
          if [ -n "$FOODISM_DEFAULT_RELAY_API_KEY" ]; then
            printf '\nFOODISM_DEFAULT_RELAY_API_KEY=%s\n' "$FOODISM_DEFAULT_RELAY_API_KEY" >> apps/electron/resources/default.env
          else
            echo "::warning::未配置 FOODISM_DEFAULT_RELAY_API_KEY，发布包不会内置默认供应商 Key"
          fi

      # 构建应用
      - name: 构建 Electron 应用
        run: bun run electron:build
        working-directory: .

      - name: 打包并发布 (Windows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish always
        working-directory: apps/electron
